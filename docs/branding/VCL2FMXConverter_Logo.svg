<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">VCL2FMXConverter Logo</title>
  <desc id="desc">A professional logo for the VCL2FMXConverter project featuring a bridge motif between VCL and FMX.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c5c"/>
      <stop offset="100%" stop-color="#1b7f8c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f2c14e"/>
      <stop offset="100%" stop-color="#ffd77a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#082f38" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1600" height="520" rx="36" fill="#f6f8fb"/>
  <g filter="url(#shadow)">
    <rect x="48" y="70" width="360" height="360" rx="42" fill="url(#bg)"/>
    <path d="M118 334 C176 200, 282 148, 390 176" fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>
    <path d="M126 334 H360" fill="none" stroke="#d8edf0" stroke-width="16" stroke-linecap="round"/>
    <circle cx="144" cy="334" r="18" fill="#f2c14e"/>
    <circle cx="362" cy="334" r="18" fill="#f2c14e"/>
    <rect x="132" y="140" width="74" height="110" rx="14" fill="#d8edf0" opacity="0.95"/>
    <rect x="255" y="116" width="74" height="134" rx="14" fill="#d8edf0" opacity="0.95"/>
    <path d="M205 194 H254" stroke="#0f4c5c" stroke-width="14" stroke-linecap="round"/>
    <path d="M340 194 H378" stroke="#f2c14e" stroke-width="14" stroke-linecap="round"/>
    <text x="122" y="385" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700" fill="#ffffff">VCL</text>
    <text x="225" y="385" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700" fill="#f2c14e">2FMX</text>
  </g>
  <g transform="translate(455,118)">
    <text x="0" y="78" font-family="Cambria, Georgia, serif" font-size="80" font-weight="700" fill="#12343b">VCL2FMXConverter</text>
    <text x="4" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" fill="#1b7f8c">Delphi Migration Engineering</text>
    <text x="4" y="196" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#355c66">
      <tspan x="4" dy="0">From VCL structure to FMX execution with</tspan>
      <tspan x="4" dy="34">disciplined, global conversion rules.</tspan>
    </text>
    <g transform="translate(0,258)">
      <rect x="0" y="0" width="212" height="56" rx="28" fill="#12343b"/>
      <text x="106" y="36" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Architecture</text>
      <rect x="234" y="0" width="212" height="56" rx="28" fill="#1b7f8c"/>
      <text x="340" y="36" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Automation</text>
      <rect x="468" y="0" width="196" height="56" rx="28" fill="#f2c14e"/>
      <text x="566" y="36" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#12343b">Validation</text>
    </g>
  </g>
</svg>
